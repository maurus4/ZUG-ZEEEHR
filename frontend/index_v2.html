<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBB | Live Verspätungs-Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --sbb-red: #EB0000;
            --sbb-anthracite: #2D2D2D;
            --sbb-white: #FFFFFF;
            --sbb-light-grey: #F6F6F6;
            --sbb-grey: #666666;
            --nordic-bg: #F0F2F5;
            --border-radius: 2px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "SBB Web", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--nordic-bg);
            color: var(--sbb-anthracite);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--sbb-white);
            padding: 1rem 2rem;
            border-bottom: 1px solid #E5E5E5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            flex-shrink: 0;
        }

        .logo {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            color: var(--sbb-red);
            text-transform: uppercase;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .stats-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-left: 4px solid var(--sbb-red);
            width: 320px;
            backdrop-filter: blur(5px);
        }

        .label {
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: var(--sbb-grey);
            margin-bottom: 0.5rem;
            display: block;
            font-weight: 700;
        }

        .count-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--sbb-red);
            line-height: 1;
        }

        .sub-label {
            font-size: 0.85rem;
            color: var(--sbb-grey);
            margin-bottom: 1rem;
        }

        #map {
            width: 100%;
            flex: 1;
            min-height: 0;
            background: #e0e0e0;
        }

        #train-list-container {
            height: 250px;
            flex-shrink: 0;
            background-color: var(--sbb-white);
            border-top: 3px solid var(--sbb-red);
            padding: 1rem 2rem;
            overflow-y: auto;
        }

        #train-list-container h3 {
            color: var(--sbb-anthracite);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        #train-list {
            list-style: none;
        }

        #train-list li {
            padding: 0.8rem 0;
            border-bottom: 1px solid #E5E5E5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #train-list li:last-child {
            border-bottom: none;
        }

        .list-delay {
            color: var(--sbb-white);
            background-color: var(--sbb-red);
            padding: 0.2rem 0.6rem;
            border-radius: var(--border-radius);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .leaflet-popup-content-wrapper {
            border-radius: var(--border-radius);
            padding: 5px;
        }

        .train-popup-title {
            font-weight: bold;
            color: var(--sbb-red);
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
            padding-bottom: 2px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            border: none;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: var(--border-radius);
            transition: all 0.2s;
        }

        .btn-live {
            background-color: var(--sbb-red);
            color: var(--sbb-white);
        }

        .btn-live:hover {
            background-color: #cc0000;
        }

        .city-label {
            background-color: transparent;
            border: none;
            box-shadow: none;
            color: var(--sbb-anthracite);
            font-weight: 700;
            font-size: 0.75rem;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.9), -1px -1px 3px rgba(255, 255, 255, 0.9);
            opacity: 0.6;
        }

        .city-label::before,
        .city-label::after {
            display: none !important;
        }

        @media (max-width: 600px) {
            .stats-panel {
                width: calc(100% - 40px);
                top: 10px;
                left: 20px;
            }
            #train-list-container {
                height: 200px;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SBB CFF FFS | Live Radar</div>
        <div class="btn-group">
            <span id="status-text" style="font-size: 0.75rem; color: var(--sbb-grey);">Bereit</span>
            <button onclick="triggerBackendSync()" class="btn btn-live">Radar aktualisieren</button>
        </div>
    </header>

    <main>
        <div class="stats-panel">
            <span class="label">Netzwerk-Status</span>
            <div id="delayed-count" class="count-value">0</div>
            <div class="sub-label">Verspätete Züge (Live)</div>
            <div id="worst-connection" style="font-size: 0.85rem; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px;">
                Warte auf Datenabruf...
            </div>
        </div>

        <div id="map"></div>
        
        <div id="train-list-container">
            <h3>Liste der verspäteten Züge</h3>
            <ul id="train-list">
                <li style="color: var(--sbb-grey); border: none;">Noch keine Daten geladen.</li>
            </ul>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const BACKEND_URL = 'http://localhost:8080';
        
        let map;
        let markers = [];

        function initMap() {
            const bounds = [
                [45.8, 5.9],
                [47.8, 10.5]
            ];

            map = L.map('map', {
                zoomControl: true,
                attributionControl: false,
                maxBounds: bounds,
                maxBoundsViscosity: 1.0,
                minZoom: 7
            }).setView([46.8182, 8.2275], 8);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function triggerBackendSync() {
            const statusText = document.getElementById('status-text');
            statusText.innerText = "Backend ruft API ab...";
            
            try {
                const response = await fetch(`${BACKEND_URL}/sync-trains`);
                const data = await response.json();
                
                if (response.ok) {
                    statusText.innerText = "Sync erfolgreich!";
                    loadDelaysFromBackend();
                } else {
                    throw new Error(data.error || "Unbekannter Fehler");
                }
            } catch (error) {
                console.error("Fehler bei der Backend-Kommunikation:", error);
                statusText.innerText = "Fehler beim Sync!";
            }
        }

        async function loadDelaysFromBackend() {
            const statusText = document.getElementById('status-text');
            const countDisplay = document.getElementById('delayed-count');
            const worstDisplay = document.getElementById('worst-connection');
            const trainListDisplay = document.getElementById('train-list');
            
            statusText.innerText = "Lade Daten aus Backend...";

            markers.forEach(m => map.removeLayer(m));
            markers = [];
            trainListDisplay.innerHTML = '';

            try {
                const response = await fetch(`${BACKEND_URL}/view-live`);
                const trains = await response.json();

                if (!response.ok) throw new Error("Fehler beim Laden der Live-Daten");

                trains.sort((a, b) => {
                    const delayA = parseInt(a.delay) || 0;
                    const delayB = parseInt(b.delay) || 0;
                    return delayB - delayA;
                });
                
                let delayedCount = 0;
                let maxDelay = 0;
                let worstTrain = null;

                trains.forEach(train => {
                    const delay = parseInt(train.delay) || 0;
                    
                    if (delay > 0) {
                        delayedCount++;
                        
                        if (delay > maxDelay) {
                            maxDelay = delay;
                            worstTrain = train;
                        }

                        const trainName = train.trip_id.split('_')[0];
                        const listItem = document.createElement('li');
                        listItem.innerHTML = `
                            <span><strong>${trainName}</strong> | ${train.origin} &rarr; ${train.destination}</span>
                            <span class="list-delay">+${delay} Min.</span>
                        `;
                        trainListDisplay.appendChild(listItem);

                        if (train.latitude && train.longitude) {
                            const marker = L.circleMarker([train.latitude, train.longitude], {
                                radius: 8 + (delay / 4),
                                fillColor: "var(--sbb-red)",
                                stroke: false,
                                fillOpacity: 0.7
                            }).addTo(map);

                            marker.bindPopup(`
                                <div class="train-popup-title">${trainName}</div>
                                <b>Verspätung: <span style="color:var(--sbb-red)">+${delay} Min.</span></b><br>
                                Von: ${train.origin}<br>
                                Nach: ${train.destination}<br>
                                Aktuelle Position: ${train.current_station || 'Auf der Strecke'}
                            `);

                            marker.bindTooltip(train.origin, {
                                permanent: true,
                                direction: 'right',
                                className: 'city-label',
                                offset: [10, 0]
                            });
                            
                            markers.push(marker);
                        }
                    }
                });

                if (delayedCount === 0) {
                    trainListDisplay.innerHTML = '<li style="color: var(--sbb-grey); border: none;">Aktuell keine verspäteten Züge.</li>';
                }

                countDisplay.innerText = delayedCount;
                if (worstTrain) {
                    const trainName = worstTrain.trip_id.split('_')[0];
                    worstDisplay.innerHTML = `<strong>Grösste Verspätung: +${maxDelay} Min</strong><br>${trainName} nach ${worstTrain.destination}`;
                } else {
                    worstDisplay.innerHTML = "Aktuell keine Verspätungen im System.";
                }

                statusText.innerText = "Live-Ansicht aktiv";

            } catch (error) {
                console.error(error);
                statusText.innerText = "Fehler beim Laden!";
                trainListDisplay.innerHTML = '<li style="color: var(--sbb-red); border: none;">Fehler beim Laden der Liste.</li>';
            }
        }

        window.onload = () => {
            initMap();
            loadDelaysFromBackend();
        };
    </script>
</body>
</html>
